<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro e Inicio de Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="forms">
        <h1>Sistema de Usuarios</h1>

    <div class="registro">
        <h2>Registro</h2>

        <input
            type="text"
            id="registerUsername"
            placeholder="Usuario">

        <input
            type="password"
            id="registerPassword"
            placeholder="Contraseña">
            <br>

        <button onclick="register()">
            Registrar
        </button>
    </div>
    
    <hr>

    <div class="registro">
        <h2>Iniciar Sesión</h2>
        <input
            type="text"
            id="loginUsername"
            placeholder="Usuario">

        <input
            type="password"
            id="loginPassword"
            placeholder="Contraseña">
            <br>

        <button onclick="login()">
            Entrar
        </button>
    </div>
    </div>
    
    

    <script src="script.js"></script>

</body>
</html>
